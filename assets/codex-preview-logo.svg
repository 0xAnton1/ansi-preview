<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Codex Preview Logo</title>
  <desc id="desc">Terminal-style logo mark for Codex Preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111f"/>
      <stop offset="100%" stop-color="#15253b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="54" y="74" width="404" height="274" rx="28" fill="url(#panel)" stroke="#2a3b55"/>
  <rect x="54" y="74" width="404" height="38" rx="28" fill="#0c1626"/>
  <circle cx="82" cy="93" r="6" fill="#fb7185"/>
  <circle cx="102" cy="93" r="6" fill="#f59e0b"/>
  <circle cx="122" cy="93" r="6" fill="#22c55e"/>
