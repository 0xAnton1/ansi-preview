  <text x="76" y="406" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">Codex Preview</text>
  <text x="78" y="438" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">ANSI charts, flows, wireframes, terminal-first previews</text>
