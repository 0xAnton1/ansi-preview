  </text>

  <text x="80" y="184" fill="#e2e8f0" font-family="'DejaVu Sans Mono', 'Liberation Mono', Menlo, Monaco, Consolas, monospace" font-size="16" xml:space="preserve">
    <tspan x="80" dy="0" fill="#2dd4bf">Metric 0.91 ┤      ⢀⣠⠴⠒⠉⠓⢦⣀</tspan>
    <tspan x="80" dy="1.4em" fill="#60a5fa">       0.64 ┤  ⢀⡴⠋        ⠙⢦⡀</tspan>
    <tspan x="80" dy="1.4em" fill="#fb7185">       0.18 ┤⠤⠋              ⠈⠒</tspan>
  </text>

  <text x="80" y="278" fill="#94a3b8" font-family="'DejaVu Sans Mono', 'Liberation Mono', Menlo, Monaco, Consolas, monospace" font-size="14" xml:space="preserve">
    <tspan x="80" dy="0">palette  </tspan>
    <tspan fill="#2dd4bf">■</tspan>
    <tspan> </tspan>
    <tspan fill="#60a5fa">■</tspan>
    <tspan> </tspan>
    <tspan fill="#fb7185">■</tspan>
    <tspan> </tspan>
    <tspan fill="#f59e0b">■</tspan>
